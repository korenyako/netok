name: Tauri Windows

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Install UI dependencies
        working-directory: ui
        run: |
          npm ci

      - name: Install frontend deps
        working-directory: netok_desktop
        run: |
          npm ci

      - name: Download sing-box binary
        shell: bash
        run: |
          curl -sL "https://github.com/SagerNet/sing-box/releases/download/v1.12.21/sing-box-1.12.21-windows-amd64.zip" -o sing-box.zip
          unzip -j sing-box.zip "sing-box-1.12.21-windows-amd64/sing-box.exe" -d netok_desktop/src-tauri/binaries/
          mv netok_desktop/src-tauri/binaries/sing-box.exe netok_desktop/src-tauri/binaries/sing-box-x86_64-pc-windows-msvc.exe

      - name: Build (Tauri)
        working-directory: netok_desktop
        env:
          CI: true
        run: |
          npx tauri build --no-bundle

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: netok-windows-exe
          path: netok_desktop/src-tauri/target/release/netok_desktop.exe
          if-no-files-found: error
